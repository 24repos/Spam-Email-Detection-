<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spam Detector</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0e14;
      --card:      #131720;
      --border:    #1f2535;
      --accent:    #e8ff47;
      --spam:      #ff4d4d;
      --ham:       #4dff91;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --font-mono: 'Space Mono', monospace;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,255,71,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,255,71,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown .6s ease both;
    }
    .badge {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 4px 12px;
      border-radius: 2px;
      margin-bottom: 20px;
    }
    h1 {
      font-family: var(--font-mono);
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -.02em;
    }
    h1 span { color: var(--accent); }
    .subtitle {
      margin-top: 12px;
      color: var(--muted);
      font-size: 15px;
      max-width: 400px;
      margin-inline: auto;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 640px;
      animation: fadeUp .6s .15s ease both;
    }

    label {
      display: block;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      height: 160px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      padding: 14px 16px;
      resize: vertical;
      outline: none;
      transition: border-color .2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    .char-count {
      text-align: right;
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      font-family: var(--font-mono);
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #000;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity .15s, transform .12s;
      position: relative;
      overflow: hidden;
    }
    button:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
    button:active:not(:disabled) { transform: translateY(0); }
    button:disabled { opacity: .45; cursor: not-allowed; }

    /* spinner inside button */
    .btn-text, .btn-spin { transition: opacity .2s; }
    .btn-spin { display: none; position: absolute; inset: 0; align-items: center; justify-content: center; }
    button.loading .btn-text { opacity: 0; }
    button.loading .btn-spin { display: flex; }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    /* ── Result ── */
    #result {
      margin-top: 28px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .4s, transform .4s;
      pointer-events: none;
    }
    #result.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

    .verdict {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 22px;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .verdict.spam  { border-color: var(--spam);  background: rgba(255,77,77,.07); }
    .verdict.ham   { border-color: var(--ham);   background: rgba(77,255,145,.07); }

    .verdict-icon {
      font-size: 2rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .verdict-label {
      font-family: var(--font-mono);
      font-size: 1.3rem;
      font-weight: 700;
    }
    .verdict.spam  .verdict-label { color: var(--spam); }
    .verdict.ham   .verdict-label { color: var(--ham); }
    .verdict-conf {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Probability bars */
    .bars-title {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .bar-row { margin-bottom: 12px; }
    .bar-meta {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 6px;
    }
    .bar-meta span:last-child {
      font-family: var(--font-mono);
      font-size: 12px;
    }
    .bar-track {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      width: 0;
      transition: width .8s cubic-bezier(.22,1,.36,1);
    }
    .bar-fill.spam { background: var(--spam); }
    .bar-fill.ham  { background: var(--ham); }

    /* Error */
    .error-box {
      padding: 14px 18px;
      background: rgba(255,77,77,.08);
      border: 1px solid var(--spam);
      border-radius: 8px;
      color: var(--spam);
      font-size: 14px;
    }

    /* ── Examples ── */
    .examples {
      margin-top: 32px;
      width: 100%;
      max-width: 640px;
      animation: fadeUp .6s .3s ease both;
    }
    .examples-title {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .example-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 260px;
    }
    .chip:hover { border-color: var(--accent); color: var(--text); }
    .chip.is-spam { border-color: rgba(255,77,77,.3); }
    .chip.is-ham  { border-color: rgba(77,255,145,.3); }

    /* ── Animations ── */
    @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:none; } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(16px);  } to { opacity:1; transform:none; } }
    @keyframes spin     { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="badge">ML · Naive Bayes</div>
  <h1>Spam<span>_</span>Detector</h1>
  <p class="subtitle">Paste any email or message below and the model will classify it in real time.</p>
</header>

<div class="card">
  <label for="emailInput">Email / Message Text</label>
  <textarea id="emailInput" placeholder="Paste an email or type a message here…" maxlength="2000"></textarea>
  <div class="char-count"><span id="charCount">0</span> / 2000</div>

  <button id="analyzeBtn" onclick="analyze()">
    <span class="btn-text">Analyze Message</span>
    <span class="btn-spin"><span class="spinner"></span></span>
  </button>

  <div id="result">
    <!-- filled by JS -->
  </div>
</div>

<div class="examples">
  <div class="examples-title">Try an example →</div>
  <div class="example-chips" id="chips"></div>
</div>

<script>
  const API = "http://127.0.0.1:5000/predict";

  const examples = [
    { text: "Congratulations! You've won a $1,000 gift card. Click here to claim!", spam: true },
    { text: "Make money fast! Work from home, earn $5000/week guaranteed!", spam: true },
    { text: "URGENT: Your account has been compromised. Verify now!", spam: true },
    { text: "Hey, are we still on for lunch tomorrow?", spam: false },
    { text: "Please find the quarterly report attached.", spam: false },
    { text: "Your appointment is confirmed for Monday at 10am.", spam: false },
  ];

  // Build chips
  const chipsEl = document.getElementById("chips");
  examples.forEach(ex => {
    const chip = document.createElement("button");
    chip.className = "chip " + (ex.spam ? "is-spam" : "is-ham");
    chip.textContent = ex.text.length > 48 ? ex.text.slice(0, 48) + "…" : ex.text;
    chip.onclick = () => {
      document.getElementById("emailInput").value = ex.text;
      updateCount();
      analyze();
    };
    chipsEl.appendChild(chip);
  });

  // Char counter
  const textarea = document.getElementById("emailInput");
  const charCount = document.getElementById("charCount");
  function updateCount() {
    charCount.textContent = textarea.value.length;
  }
  textarea.addEventListener("input", updateCount);

  // Main analysis
  async function analyze() {
    const text = textarea.value.trim();
    if (!text) { showError("Please enter some text to analyse."); return; }

    const btn = document.getElementById("analyzeBtn");
    btn.disabled = true;
    btn.classList.add("loading");
    hideResult();

    try {
      const res = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text }),
      });

      if (!res.ok) throw new Error(`Server error: ${res.status}`);
      const data = await res.json();
      showResult(data);
    } catch (err) {
      if (err.message.includes("fetch") || err.message.includes("Failed")) {
        showError("Cannot reach the Flask server. Make sure it is running on port 5000.");
      } else {
        showError(err.message);
      }
    } finally {
      btn.disabled = false;
      btn.classList.remove("loading");
    }
  }

  function showResult(d) {
    const resultEl = document.getElementById("result");
    const icon  = d.is_spam ? "🚨" : "✅";
    const cls   = d.is_spam ? "spam" : "ham";

    resultEl.innerHTML = `
      <div class="verdict ${cls}">
        <div class="verdict-icon">${icon}</div>
        <div>
          <div class="verdict-label">${d.label}</div>
          <div class="verdict-conf">Confidence: ${d.confidence}%</div>
        </div>
      </div>

      <div class="bars-title">Probability Breakdown</div>

      <div class="bar-row">
        <div class="bar-meta">
          <span>🚨 Spam</span>
          <span>${d.spam_prob}%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill spam" id="barSpam"></div>
        </div>
      </div>

      <div class="bar-row">
        <div class="bar-meta">
          <span>✅ Not Spam</span>
          <span>${d.ham_prob}%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill ham" id="barHam"></div>
        </div>
      </div>
    `;

    resultEl.classList.add("visible");

    // Animate bars after a tick
    requestAnimationFrame(() => {
      setTimeout(() => {
        document.getElementById("barSpam").style.width = d.spam_prob + "%";
        document.getElementById("barHam").style.width  = d.ham_prob  + "%";
      }, 50);
    });
  }

  function showError(msg) {
    const resultEl = document.getElementById("result");
    resultEl.innerHTML = `<div class="error-box">⚠️ ${msg}</div>`;
    resultEl.classList.add("visible");
  }

  function hideResult() {
    const resultEl = document.getElementById("result");
    resultEl.classList.remove("visible");
  }

  // Allow Ctrl+Enter to submit
  textarea.addEventListener("keydown", e => {
    if (e.key === "Enter" && e.ctrlKey) analyze();
  });
</script>
</body>
</html>
